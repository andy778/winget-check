# OpenSSF Scorecard analysis. Publishing the results is what makes the
# Scorecard badge in the README render data for this repository.
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 1'
  push:
    branches: ["main"]

# Read-only by default; individual jobs request what they need.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (publish_results: true).
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        env:
          # The SBOM check is still experimental upstream and is skipped
          # unless this variable is set (to any value).
          SCORECARD_EXPERIMENTAL: "1"
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API so the README badge works.
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
