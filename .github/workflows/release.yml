# Builds cross-platform binaries and publishes a GitHub Release with an SBOM
# attached (exported from GitHub's native dependency graph), so OpenSSF
# Scorecard's SBOM check finds it as a release artifact (the check's
# preferred, full-credit location).
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          out="winget-check-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -o "$out" .
          echo "asset $out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: winget-check-*
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Generate SBOM via GitHub's dependency graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/${{ github.repository }}/dependency-graph/sbom" \
            --jq '.sbom' > winget-check.spdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* winget-check.spdx.json \
            --title "${{ github.ref_name }}" \
            --generate-notes
